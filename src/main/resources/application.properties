spring.application.name=frame-backend

# Database Configuration (Docker Compose)
spring.datasource.url=jdbc:postgresql://localhost:5432/frame_backend
spring.datasource.username=postgres
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# -------------------------------------------------------------------------
# SECURITY CONFIGURATION (Modern Mobile Auth)
# -------------------------------------------------------------------------

# JWT Secret Key (Base64 Encoded 256-bit key)
# This key is used to sign ACCESS TOKENS.
application.security.jwt.secret-key=QE5jUmZValhuMnI1dTh4L0EzPkQoRytLYlBkU2dWa1lw

# Access Token Expiration: 15 minutes (900000 ms)
application.security.jwt.access-token.expiration=900000

# Refresh Token Expiration: 30 days (2592000000 ms)
application.security.jwt.refresh-token.expiration=2592000000

# Issuer (Token Origin)
application.security.jwt.issuer=frame-backend

# -------------------------------------------------------------------------
# SOCIAL AUTH KEYS (For Validating Apple/Google Tokens)
# -------------------------------------------------------------------------
# Note: In production, store these in environment variables or a vault.
# For Google Identity Token validation
social.google.client-id=YOUR_GOOGLE_CLIENT_ID_FROM_CONSOLE

# For Apple Sign In
social.apple.client-id=com.yourapp.bundle.id

spring.application.name=frame-backend

# -------------------------------------------------------------------------
# DATABASE CONFIGURATION
# -------------------------------------------------------------------------
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/frame_backend}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# -------------------------------------------------------------------------
# JAVA 21 VIRTUAL THREADS
# -------------------------------------------------------------------------
spring.threads.virtual.enabled=true

# -------------------------------------------------------------------------
# SECURITY CONFIGURATION (Modern Mobile Auth)
# -------------------------------------------------------------------------

# JWT Secret Key (Base64 Encoded 256-bit key)
# Should be stored in environment variable JWT_SECRET_KEY
application.security.jwt.secret-key=${JWT_SECRET_KEY:QE5jUmZValhuMnI1dTh4L0EzPkQoRytLYlBkU2dWa1lw}

# Access Token Expiration: 15 minutes (900000 ms)
application.security.jwt.access-token.expiration=900000

# Refresh Token Expiration: 30 days (2592000000 ms)
application.security.jwt.refresh-token.expiration=2592000000

# Issuer (Token Origin)
application.security.jwt.issuer=frame-backend

# -------------------------------------------------------------------------
# SOCIAL AUTH KEYS
# -------------------------------------------------------------------------
# Ensure these are set in your deployment environment variables.
social.google.client-id=${GOOGLE_CLIENT_ID:YOUR_GOOGLE_CLIENT_ID_PLACEHOLDER}
social.apple.client-id=${APPLE_CLIENT_ID:com.yourapp.bundle.id}
